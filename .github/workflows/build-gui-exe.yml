name: Build GUI EXE

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "gui.py"
      - "requirements.txt"
      - "src/**"
      - ".github/workflows/build-gui-exe.yml"

jobs:
  build-windows-exe:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: "requirements.txt"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build GUI executable
        run: |
          pyinstaller --noconfirm --clean --windowed --name DiacriticalCharacters gui.py

      - name: Bundle runtime data
        shell: pwsh
        run: |
          Copy-Item -Recurse -Force pickle "dist\DiacriticalCharacters\pickle"
          Copy-Item -Recurse -Force txt "dist\DiacriticalCharacters\txt"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: DiacriticalCharacters-windows
          path: dist/DiacriticalCharacters/**
          if-no-files-found: error
