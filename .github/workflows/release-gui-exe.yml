name: Release GUI EXE

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-and-release-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: "requirements.txt"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build GUI executable
        run: |
          pyinstaller --noconfirm --clean --windowed --name DiacriticalCharacters gui.py

      - name: Bundle runtime data
        shell: pwsh
        run: |
          Copy-Item -Recurse -Force pickle "dist\DiacriticalCharacters\pickle"
          Copy-Item -Recurse -Force txt "dist\DiacriticalCharacters\txt"

      - name: Create release package
        id: package
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $zipName = "DiacriticalCharacters-$tag-windows.zip"
          Compress-Archive -Path "dist\DiacriticalCharacters\*" -DestinationPath $zipName -Force
          "zip_name=$zipName" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
          files: ${{ steps.package.outputs.zip_name }}
