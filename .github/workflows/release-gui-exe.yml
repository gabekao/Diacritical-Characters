name: Release GUI EXE

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (for example: 1.0.0 or v1.0.0)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  build-and-release-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: "requirements.txt"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Normalize version tag
        id: version
        shell: pwsh
        run: |
          $raw = "${{ inputs.version }}".Trim()
          if ([string]::IsNullOrWhiteSpace($raw)) {
            throw "Version input is required."
          }
          if ($raw.StartsWith("v")) {
            $tag = $raw
          } else {
            $tag = "v$raw"
          }
          "tag=$tag" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Build GUI executable
        run: |
          pyinstaller --noconfirm --clean --windowed --name DiacriticalCharacters gui.py

      - name: Bundle runtime data
        shell: pwsh
        run: |
          Copy-Item -Recurse -Force pickle "dist\DiacriticalCharacters\pickle"
          Copy-Item -Recurse -Force txt "dist\DiacriticalCharacters\txt"

      - name: Create release package
        id: package
        shell: pwsh
        run: |
          $tag = "${{ steps.version.outputs.tag }}"
          $zipName = "DiacriticalCharacters-$tag-windows.zip"
          Compress-Archive -Path "dist\DiacriticalCharacters\*" -DestinationPath $zipName -Force
          "zip_name=$zipName" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.tag }}
          target_commitish: ${{ github.sha }}
          generate_release_notes: true
          files: ${{ steps.package.outputs.zip_name }}
